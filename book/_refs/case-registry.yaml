      PM 從 Driver 退位為壓力傳遞者、QA 輸入未進入決策迴路），上線窗口
      評分若套用本章矩陣僅得 1 分（落在 No-go 建議範圍）。本章用此案例展示
      「上線不等於交付」與一頁式 Release Go/No-go Checklist 模板。

  # ========== PM Playbook Ch 2 ==========
  - id: CASE-FIN-101
    title: "MerchantFlow KYC 改版（AML 合規升級）的 Approver 缺位事故"
    domain: fintech
    chapters: [pm-ch-02]
    anonymized: true
    summary: |
      虛構 B2B 支付清算金融科技公司 MerchantFlow（客戶為中型電商平台）。
      2025 年第二季 AML 監管指引更新後，需在六個月內升級已三年未動的 KYC
      流程。PM Vanessa Chen 在 kickoff 階段只與 Compliance（Kevin Tan）對齊，
      把 roadmap 視為已就緒並開 sprint，未把 Legal（Rachel Ho）與 CFO
      （Daniel Lim）納入決策鏈——他們實際上是 KYC 收集範圍與授權邊界的
      Approver，卻被放在 Informed 位置。法務在第五週的季度規劃會議上才出現，
      以「過度收集個資的合規風險」為由要求重審 KYC 欄位範圍，已寫好的第一個
      KYC 驗證 API 被迫回退。根因為三層：(1) 把「Compliance 說可以」當成最終
      授權；(2) DACI 結構中 Approver 缺位、Legal/CFO 被降格為 Informed；
      (3) 未在 kickoff 前做 stakeholder mapping，錯過了「需求跨部門 +
      涉及合規/法務 + 有預算授權」三個應主動啟動分析的觸發點。Vanessa 在第五週
      補做 Stakeholder Map（Power/Interest 分類 + DACI 對映 + 溝通計畫），
      把「法務突然出現」從意外事件轉為可管理風險。本章用此案例展示「在需求
      定義前先搞清楚誰說了算」的 stakeholder mapping 流程與一頁式模板。

  # ========== PM Playbook Ch 28 ==========
  - id: CASE-FIN-103
    title: "FinCore Apex 清算遷移計畫 Q2 QBR 失效與 Executive Communication 重設計"
    domain: fintech
    chapters: [pm-ch-28]
    anonymized: true
    summary: |
      虛構跨境 B2B 支付清算金融科技公司 FinCore，PM Lead Marcus 主導為期
      十八個月的核心清算引擎雲端遷移計畫（代號 Apex，總預算 US$4.2M、
      四個 Squad），目標是把自建 on-premise 批次清算系統遷移到雲端即時
      清算架構，以支援大客戶合約中的 T+0 清算 SLA 承諾。計畫第七個月的
      Q2 QBR，Marcus 準備了二十三頁進度報告，但 CFO、COO、Head of
      Compliance 與 CEO 在四十分鐘內無法拿到三個核心決策所需的資訊：
      是否追加預算加速延遲三週的 Squad C、是否啟動大客戶 SLA 保護方案、
      是否讓 Compliance 在遷移完成前提前介入稽核。四十分鐘內 Marcus 回答
      十一個問題，只有三個讓 Executive 拿到可決策的答案，其餘八個排到
      兩週後 follow-up。根因不是資訊不夠，而是把 QBR 設計成進度彙報而非
      決策場合：缺乏受眾分析、Outputs/Outcomes/Impact 三層脫節、DACI 未在
      會前確認、Ask 未結構化。重設計後改用 QBR Ready Pack（Context →
      Progress → Risk → Ask → Next 五格），每個 Ask 帶齊推薦做法、判斷
      依據（NPV 分析）、若不決定的代價（合約通知條款觸發機制）與 DACI，
      CFO 在收到草稿後十五分鐘批核核心決策。用於展示 Outputs/Outcomes/
      Impact 三角在向上匯報的應用、QBR 五格架構與 SCQA 的選擇邏輯，以及
      DACI 在 Executive 場合的即時確認機制。

  # ========== PM Playbook Ch 20 ==========
  - id: CASE-SAS-108
    title: "Formly 的儀式走過場：Sprint Review 變成 Demo，Retro 沒有行動"
    domain: saas
    chapters: [pm-ch-20]
    anonymized: true
    summary: |
      虛構 B2B SaaS Formly：PM Yuna 把 Sprint Review 當成對外客戶 Demo，
      取消內部驗收；Retrospective 每次 30 分鐘固定格式，行動項從未指定
      Owner 也未進入任何追蹤系統。相同的「Backlog 不清楚、refinement 做了
      但故事沒寫完」問題連續三個 sprint 在 Retro 被提出。根因為 Yuna 把自己
      定位成五個 Sprint Ceremonies 的「主持人」而非「決策責任者」，導致每個
      儀式的核心判斷（Ready sign-off、可驗收 Sprint Goal、阻礙升級、Done
      驗收、行動項追蹤）都沒有人執行。Planning 當天 PM 與 EM 對承諾量出現
      歧見時也無明確拍板規則。後續導入一頁式 Sprint Ceremonies PM 責任卡，
      明確五個儀式的決策點與 DACI（含 Planning 衝突時 EM feasibility 否決權），
      問題自 Sprint 29 起不再重複。用於展示「PM 在敏捷儀式裡是決策責任者，
      不是會議主持人」。

  # ========== PM Playbook Ch 43 ==========
  - id: CASE-SAS-115
    title: "Notewise AI 依賴症：PM 讓 AI 寫 PRD，自己失去了問題理解"
    domain: saas
    chapters: [pm-ch-43]
    anonymized: true
    summary: |
      虛構 SaaS 協作筆記工具 Notewise：PM Ricky 在六個月內把所有 PRD 交給
      AI 生成第一版草稿、補使用者故事、整理競品分析，速度提升三倍，工程與
      設計都稱讚 spec 清楚。但在季度 PRD Review 上，產品總監問「這個功能解決
      誰的問題？你自己的理解是什麼？」時，Ricky 只能複述 AI 輸出，答不出超出
      文件的內容。一個 AI 自動摘要功能 PRD 被退回重做，根因為功能邊界、成功
      指標、競品失敗點三個決策從未被 PM 親自釐清——他把 Outputs 的生成與
      Outcomes/Impact 的判斷一起外包給了 AI。後續導入「AI 工具介入邊界卡」，
      把問題框架段落、第一手接觸確認、未驗證假設標記重新收回 PM 手上。
      用於展示「AI 工具是外包執行，不是外包判斷」與 Augmented PM 的角色邊界。

  # ========== PM Playbook Ch 34 ==========
  - id: CASE-ECM-112
    title: "CartFlow GMV 陷阱：North Star 達成了，利潤卻是負的"
    domain: ecommerce
    chapters: [pm-ch-34]
    anonymized: true
    summary: |
      虛構中型電商 CartFlow：North Star Metric 設為 GMV，由成長、商品、
      物流三個 Squad 各自追自己的 Outcome 指標。Q3 GMV 成長 35%、超標
      十個百分點，全員週報一片綠燈，但同期稅前淨利潤為負（每賣一塊錢
      平均虧 0.08 元）、退貨率 42%（高於行業均值 23 個百分點）、物流
      成本佔 GMV 17.3%。根因不是「指標選錯」，而是「選 North Star 這件
      事從未被正式做過」——GMV 因為最容易量、最容易達成、最容易在週報
      呈現而成為預設北極星，從未經過 CPO 拍板，也沒有任何護欄指標。
      事故後 CPO Vera 召集 PM team 與財務 BP，在兩天內重建 North Star
      定義卡：改用活躍付費用戶數（APU）為 North Star，補上退貨率、物流
      成本佔比、促銷折讓佔比三條帶警告/緊急門檻的護欄，並以 DACI 明確
      Approver 為 CPO。用於展示 North Star 四維度篩選（可感知性 / 可驅動性
      / 抗遊戲性 / 健康代理性）、Outputs/Outcomes/Impact 三層拆解、護欄
      指標門檻設計，以及 North Star 定義的 Approver 拍板機制。
