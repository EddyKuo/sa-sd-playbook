      Invoice / Tax / Dunning / Webhook 七處。VP 在白板嘗試畫整個流程
      失敗,因為混合了編排層、生命週期層、規則層三件本質不同的事。
      用於展示「BPMN / 狀態機 / 決策表三者不是替代,是不同層次」。
      整季客服 escalation 71 件、工時 318 小時、流失 2 個續約。

  # ========== Ch 10 ==========
  - id: CASE-ENR-002
    title: "VoltMesh Energy 的『即時告警』歧義事故"
    domain: energy
    chapters: [ch-10]
    anonymized: true
    summary: |
      虛構工商儲能新創 VoltMesh Energy(23 人)在 1MW/2MWh 工商儲能櫃
