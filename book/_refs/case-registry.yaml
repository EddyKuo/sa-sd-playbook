  # ========== Ch 6 ==========
  - id: CASE-FIN-002
    title: "NorthBay Pay 8.40 美元拒付的資料拓樸失蹤事件"
    domain: fintech
    chapters: [ch-06]
    anonymized: true
    summary: |
      虛構支付公司 NorthBay Pay(140 人,Spring Boot 3 + PostgreSQL 16
      + Kafka 3.7,跑 Visa / Mastercard 收單與跨境清算)。一筆來自馬來
      西亞銀行的 ISO 8583 1442 拒付訊息(理由代碼 4837 / No Cardholder
      Authorization,金額 8.40 美元),公司無法在事故會議內回答這筆交易
      在 47 個 Kafka topic 與 7 個服務之間走過哪幾步、寫進哪些表。
      Head of Engineering 公開承認「沒有一張圖能告訴我這 47 個 topic 在
      哪裡產生、被誰消費、寫進哪張表」。後續以 Mermaid 補畫 Context +
      Level 0 DFD、配套資料字典、9 張 Data Lineage Card,並用 CI Fitness
      Function 與 OpenLineage / Schema Registry 對齊;47 個 topic 收斂
      到 31 個,類似拒付事件可在 14 分鐘內回答。

  # ========== Ch 7 ==========
  - id: CASE-ECM-003
    title: "DripCycle 訂閱快時尚電商:47 用例 / 18% 出包率事故"
    domain: ecommerce
    chapters: [ch-07]
    anonymized: true
    summary: |
      虛構訂閱型快時尚電商 DripCycle(月費租穿、約 11 萬會員,Next.js 15
      + Spring Boot 3.3 + PG 17 + Stripe)上線「冷靜期 7 天退款 + 換貨
      + 部分退款」三條流程,Confluence 寫了 47 個用例文檔(Cockburn
      模板齊全),上線後 18% 訂單需人工介入。根因為四張 OOA 圖(Use Case
      / Class / Sequence / State)各畫各的,沒有對應關係。重做 OOA 後
      用例從 47 縮為 19、類別從 38 縮為 12,並導入 Use Case Atom + 四圖
      協同表 PR checklist。

  # ========== Ch 8 ==========
  - id: CASE-HCR-002
    title: "MedCanvas Inpatient 的四個 patient_id 事故"
    domain: healthcare
    chapters: [ch-08]
    anonymized: true
    summary: |
      虛構住院資訊系統廠商 MedCanvas Inpatient 接下 1,800 床醫學中心
      合約,導入第 11 週發現出院結算單 ICD-10 主診斷碼 6.4% 對不上
      病房紀錄。根因:四張表都有名為 patient_id 的 bigint 欄位,但語意
      分別為預掛號 token、住院 episode ID、終身 MRN、他院 PID-3 (HL7),
      工程師習慣性 join 後在跨院轉診病人上撞車。Schema 通過 3NF 稽核但
      仍出事,用於展示「3NF 通過不等於 schema 是好的」。

  # ========== Ch 9 ==========
  - id: CASE-SAS-002
    title: "LedgerPilot 訂閱計費 7-service 流程迷宮"
    domain: saas
    chapters: [ch-09]
    anonymized: true
    summary: |
      虛構 B2B 訂閱與計費 SaaS LedgerPilot(4,200 客戶、MRR 940 萬美元、
      工程 38 人):一筆 $42.13 的 proration 多算客訴觸發 3 小時跨 7 個
