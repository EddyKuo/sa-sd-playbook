      DIP 同時違反。後續以 Clean Architecture 3 環重構,並導入 ArchUnit
      fitness function 守護依賴方向,新增規則改動半徑收斂為 2 個檔案。

  # ========== Ch 12 ==========
  - id: CASE-SAS-003
    title: "MeshConduit B2B 整合平台:30 個 GoF 包 100 行業務的 PR 事故"
    domain: saas
    chapters: [ch-12]
    anonymized: true
