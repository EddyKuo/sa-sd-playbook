      路徑,工時超出原估 1.4 倍。用於展示「PRD / SRS / MVP 三份文件
      壓縮三層不同歧義,錯位即代價」。

  # ========== Ch 11 ==========
  - id: CASE-FIN-003
    title: "AxisPay FraudGuardCore 14 檔案改動半徑事故"
    domain: fintech
    chapters: [ch-11]
    anonymized: true
    summary: |
      虛構東南亞跨境收單支付公司 AxisPay(26 人,Spring Boot 3.3 + PG 17 +
