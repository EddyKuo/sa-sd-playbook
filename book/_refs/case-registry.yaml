  # ========== Ch 14 ==========
  - id: CASE-ECM-004
    title: "HarborGate 開放平台:三套 schema 對不起來的 12 萬賠款事故"
    domain: ecommerce
    chapters: [ch-14]
    anonymized: true
    summary: |
      虛構電商開放平台 HarborGate(GMV 12 億美元 / 200+ partner,Node.js 22 +
      Spring Boot 3.3 + PG 17 + Kafka 3.7)同時開放 REST / GraphQL / Webhook
      三套 API,但三套 schema 各自演化:status enum 不同(paid/PAID/已付款)、
      total 型別不同(浮點/Money 物件/字串)、order 命名不同。Webhook 無
      idempotency-key 導致 partner 重複出貨,事故賠款新台幣 12 萬。重構為
      v3 開放平台:統一 OpenAPI 3.1 + AsyncAPI 3.0、Idempotency-Key required、
      HMAC 簽章、Webhook 5 次重試曲線、`_actions` HATEOAS for Agent、18 個月
      棄用節奏。47 條 contract card 取代 200 條重複 endpoint。

  # ========== Ch 15 ==========
  - id: CASE-ENR-003
    title: "SunLedger Energy 太陽能電廠資料平台『PG 撐不住』誤判事故"
    domain: energy
    chapters: [ch-15]
    anonymized: true
    summary: |
      虛構太陽能電廠 EPC 後台 SunLedger Energy(320 案場、4,800 顆 inverter,
      Modbus/SunSpec 15s 輪詢、IEC 61850 MMS 併網點)在 PG 17 上跑 7 億 row
      telemetry。資料工程師憑直覺判斷「PG 撐不住」,跳過 workload profile,
      直接遷移至 Cassandra(3 nodes, RF=3)。六個月後同一份月報查詢從 90 秒
      變 4 分 12 秒。根因為「讀密集 + 二次聚合 workload」誤判為「寫密集擴展
      問題」,未評估 TimescaleDB hypertable + continuous aggregate。展示
      「沒做 workload profile 就換引擎」與 Storage Selection Card 的價值。

  # ========== Ch 16 ==========
  - id: CASE-FIN-004
    title: "NeoLedger Bank 的 KYC 70% 放棄率事件"
    domain: fintech
    chapters: [ch-16]
    anonymized: true
    summary: |
      虛構亞太數位銀行 NeoLedger Bank(SG / HK / TW 三市場、設計 11 人、
      工程 60 人)KYC 流程 Happy Path 完成率 83% 但全段轉換率僅 41%。根因
      為 14 種失敗情境共用三句 generic 錯誤文案,進入錯誤頁的客戶 70% 在
      8 秒內關閉 App、30 天未回訪。重構導入 Journey ↔ State 對齊矩陣、
      DACR 四維錯誤訊息、Interaction State Card 與 WCAG 2.2 AA 強制檢核;
      同錯誤頁「再試」點擊率從 18% 升到 47%。展示「UX 真正的戰場是
      unhappy path,不是 Happy Path」。

  - id: CASE-HCR-004
    title: "居家視訊看護:跌倒偵測的 SDC 多模態系統"
    domain: healthcare
    chapters: [ch-17]
    anonymized: true
    summary: |
      虛構居家看護場景:長者在客廳,系統用攝影機 + 語音助理持續監看。
      跌倒事件下,單純 BPMN 流程(攝影機告警→語音問候→判斷)會在 false
      positive(影子/坐姿改變/寵物穿過)、長者昏迷無回應、語調顫抖卻說
      「我沒事」等真實情境下失效。用於展示「感知→推論→決策」這一層
      需要 Signal-Decision-Confidence(SDC)模型,而非離散流程圖。


  # ========== Ch 17 ==========
  - id: CASE-HCR-005
    title: "聖維禮醫療體系:三個 BC 共用 patient 的出院結算事故"
    domain: healthcare
    chapters: [ch-17]
    anonymized: true
    summary: |
      虛構多科別教學醫院聖維禮醫療體系(1,400 床、跨七科別、資訊科 38 人,
      .NET Framework 4.8 HIS + SQL Server linked server 跨系統查資料)。
      2025 年三月一週發生七次出院結算對不上臨床紀錄事故,根因為三個子系統
      Clinical / Billing / Scheduling 都用名為 patient_id 的 bigint 欄位,
      但 Clinical 是「就診事件主體」、Billing 是「保險被保人 + 財務責任人」、
      Scheduling 是「未來時段佔位人」三種不同語意。團隊用 11 個月做戰略
      設計(Subdomain 分類、Bounded Context 識別、Context Map 八種模式
      標註),並在 Clinical 內把 Patient 重命名為 Encounter Aggregate Root。
      事故率從每月 27 件降至第 12 個月 1.4 件。展示「DDD 真正價值在語言邊界」。

  - id: CASE-SAS-013
    title: "VoiceLoft 語音點餐 + 視覺確認:BPMN 圖完成了、工程師看完是沉默"
    domain: saas
    chapters: [ch-17]
    anonymized: true
    summary: |
