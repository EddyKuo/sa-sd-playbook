      收斂到 220 行。展示「模式是命名,不是結構」與「先用模式再找問題」反模式。

  # ========== Ch 13 ==========
  - id: CASE-HCR-003
    title: "CareLattice Health 從分層遷到六角:第 9 個 EMR 的轉折點"
    domain: healthcare
    chapters: [ch-13]
    anonymized: true
    summary: |
      虛構醫院資訊系統廠商 CareLattice Health(門急診排程與用藥安全核對引擎,
