      2025 年三月一週發生七次出院結算對不上臨床紀錄事故,根因為三個子系統
      Clinical / Billing / Scheduling 都用名為 patient_id 的 bigint 欄位,
      但 Clinical 是「就診事件主體」、Billing 是「保險被保人 + 財務責任人」、
