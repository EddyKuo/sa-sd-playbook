  - id: CASE-ECM-113
    title: "ShopFlow 的提前判決：CEO 看到 A/B 早期數據就要求停止實驗"
    domain: ecommerce
    chapters: [pm-ch-35]
    anonymized: true
    related_cases: [CASE-ECM-107]
    summary: |
      虛構中型電商 ShopFlow（每日結帳人次約 3,200）：結帳頁折扣資訊位置
      A/B 測試，PM 林玟事前算過需要 14 天、每組 22,400 筆樣本才能達到 95%
      信心水準。第五天 CEO 在儀表板上看到 A 組轉換率 4.2% 略高於 B 組 3.8%，
      在開會前五分鐘於 Slack 要求「A 贏了，全量上吧」。林玟未能援引任何書面
      停止規則，四小時後 B 組流量切零、A 版全量上線。第三天轉換率回到兩組
      共有基準 4.0%，Weekly Active Buyer 毫無移動，第九天客服回報零星「結帳
      頁感覺怪怪的」抱怨。事後覆盤發現第五天的差異只是隨機波動疊加一次推送
      通知的受眾污染（推送分組與實驗分組重疊、A 組推送比例偏高）。根因為
      實驗啟動前沒有定義主指標 / 護欄指標 / MDE / 停止規則，也沒有 DACI 約定
      誰能在什麼時候用什麼理由提前終止——CEO 的組織權威落在沒有任何防護的
      空白地帶。本章用此案例展示「實驗設計卡」、Peeking Problem、護欄指標與
      停止規則如何把統計信心水準翻譯成 CEO 能理解的決策語言，與 CASE-ECM-107
      （ShopFlow 提前上線、Rollback 缺位）形成同公司跨章對照。

