      「我沒事」等真實情境下失效。用於展示「感知→推論→決策」這一層
      需要 Signal-Decision-Confidence(SDC)模型,而非離散流程圖。


  # ========== Ch 17 ==========
  - id: CASE-HCR-005
    title: "聖維禮醫療體系:三個 BC 共用 patient 的出院結算事故"
    domain: healthcare
    chapters: [ch-17]
    anonymized: true
    summary: |
      虛構多科別教學醫院聖維禮醫療體系(1,400 床、跨七科別、資訊科 38 人,
