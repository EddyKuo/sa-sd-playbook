      設計(Subdomain 分類、Bounded Context 識別、Context Map 八種模式
      標註),並在 Clinical 內把 Patient 重命名為 Encounter Aggregate Root。
      事故率從每月 27 件降至第 12 個月 1.4 件。展示「DDD 真正價值在語言邊界」。

