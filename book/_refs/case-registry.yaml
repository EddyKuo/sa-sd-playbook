  # ========== Ch 21 ==========
  - id: CASE-ECM-005
    title: "TideCart 黑五 inventory cascade failure 事故"
    domain: ecommerce
    chapters: [ch-21]
    anonymized: true
    summary: |
      虛構東南亞快時尚電商 TideCart(GMV 4.8 億美元),2023 年從 Rails monolith
      一刀拆出 32 個微服務,黑五當天 inventory-service P99 從 80ms 漲到 2.4s,
