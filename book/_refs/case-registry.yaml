      P99 從 47 秒降到 1.2 秒。展示「微服務不是規模化的方法,是強制購買的稅金」。

  # ========== Ch 22 ==========
  - id: CASE-FIN-006
    title: "CardPilot Asia 三件套 EDA + CQRS + ES 上線當天 P99 從 80ms 變 320ms 事故"
    domain: fintech
    chapters: [ch-22]
    anonymized: true
    summary: |
      虛構東南亞跨境收單與虛擬卡發行平台 CardPilot Asia(56 人,Spring Boot 3.3
